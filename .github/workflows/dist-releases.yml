name: dist (binstall-ready releases)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: dist-releases-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish-crate:
    name: publish crate to crates.io
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91.0"

      - name: Publish greentic-gui to crates.io (master)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          version="$(cargo metadata --format-version 1 --no-deps \
            | python -c 'import json,sys; meta=json.load(sys.stdin); print(next(p for p in meta["packages"] if p["name"]=="greentic-gui")["version"])')"

          log="$(mktemp)"
          if cargo publish --locked 2> >(tee "$log" >&2); then
            echo "Published greentic-gui ${version} to crates.io"
            exit 0
          fi

          if grep -qi "is already uploaded" "$log"; then
            echo "greentic-gui ${version} already on crates.io; continuing without failure."
            exit 0
          fi

          echo "cargo publish failed for greentic-gui ${version}; see log above." >&2
          exit 1

  # Build binstall-friendly artifacts after crates.io publish succeeds (or is skipped).
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runs_on }}
    needs: [publish-crate]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs_on: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runs_on: ubuntu-24.04-arm
          - target: x86_64-pc-windows-msvc
            runs_on: windows-latest
          - target: aarch64-pc-windows-msvc
            runs_on: windows-11-arm
          - target: x86_64-apple-darwin
            # Prefer the recommended Intel image for x86_64 macOS builds.
            runs_on: macos-15-intel
          - target: aarch64-apple-darwin
            # Prefer the recommended Apple Silicon image.
            runs_on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91.0"
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release bundle
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(cargo metadata --format-version 1 --no-deps | python -c 'import json,sys; data=json.load(sys.stdin); print(next(p["version"] for p in data["packages"] if p.get("name")=="greentic-gui"))')
          TARGET="${{ matrix.target }}"
          ARTIFACT_DIR="dist"
          STAGING="$ARTIFACT_DIR/greentic-gui-v${VERSION}-${TARGET}"

          cargo fetch --locked --target "$TARGET"
          cargo build --locked --release --target "$TARGET"

          BIN_EXT=""
          if [[ "$TARGET" == *windows* ]]; then
            BIN_EXT=".exe"
          fi

          mkdir -p "$STAGING"
          cp "target/$TARGET/release/greentic-gui$BIN_EXT" "$STAGING/"
          cp README.md LICENSE "$STAGING/"

          tar czf "$STAGING.tgz" -C "$STAGING" .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/greentic-gui-v*-${{ matrix.target }}.tgz
          if-no-files-found: error

  publish:
    name: publish release
    runs-on: ubuntu-latest
    needs: [build, publish-crate]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91.0"

      - name: Compute crate version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(cargo metadata --format-version 1 --no-deps | python -c 'import json,sys; data=json.load(sys.stdin); print(next(p["version"] for p in data["packages"] if p.get("name")=="greentic-gui"))')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List release assets
        shell: bash
        run: |
          set -euo pipefail
          ls -R dist

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: greentic-gui v${{ steps.version.outputs.version }}
          files: dist/**/*.tgz
          generate_release_notes: true
